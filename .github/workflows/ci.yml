name: CI

on:
  - push
  - pull_request

# When the app imports from `$env/static/*`, add an `env:` block here with a
# placeholder for every key (see TEMPLATE.md §5). The base template imports none.

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Smoke test production build
        env:
          PORT: 3000
        run: |
          pnpm start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:3000/ > /dev/null; then
              echo "App responded successfully on attempt $i"
              kill "$SERVER_PID"
              exit 0
            fi
            echo "Waiting for app to start... ($i)"
            sleep 1
          done
          echo "App did not respond in time"
          kill "$SERVER_PID"
          exit 1
